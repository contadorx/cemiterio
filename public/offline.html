<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sem internet — Zelo & Memória</title>
<style>
  body { margin:0; font-family: system-ui, sans-serif; background:#f7f3e9; color:#0f172a;
         display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
  .caixa { max-width: 420px; text-align:center; }
  h1 { color:#12284b; font-size:22px; margin:0 0 10px; }
  p { font-size:17px; line-height:1.6; color:#475569; margin:0 0 20px; }
  button { min-height:56px; padding:16px 28px; font-size:17px; font-weight:700;
           background:#0f766e; color:#fff; border:none; border-radius:14px; cursor:pointer; }
</style>
</head>
<body>
  <div class="caixa">
    <div style="font-size:40px">🌿</div>
    <h1>Sem internet agora</h1>
    <p>Pode ser o sinal no cemitério. Assim que voltar, é só tentar de novo — nada do que você fez se perdeu.</p>
    <button onclick="location.reload()">Tentar de novo</button>
  </div>
</body>
</html>
